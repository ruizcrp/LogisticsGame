<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logistics Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
html, body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; width: 100vw; height: 100vh; position: relative; }
#top-bar { display: flex; align-items: center; justify-content: space-around; height: 46px; background: #16213e; border-bottom: 1px solid #2a2a4e; font-size: 13px; z-index: 20; position: relative; }
.top-item { display: flex; align-items: center; gap: 4px; }
.lbl { color: #888; font-size: 10px; text-transform: uppercase; }
.val { font-weight: bold; }
.money { color: #4ecca3; }
#canvas { display: block; outline: none; background: #0f3460; position: absolute; top: 46px; bottom: 52px; width: 100%; z-index: 1; }
#nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #16213e; border-top: 1px solid #2a2a4e; z-index: 20; height: 52px; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #888; font-size: 10px; cursor: pointer; padding: 0; }
.nav-btn.active { color: #6d4aff; border-top: 2px solid #6d4aff; }
.nav-icon { font-size: 14px; margin-bottom: 1px; }
.panel { position: fixed; top: 46px; bottom: 52px; left: 0; right: 0; background: #16213e; overflow-y: auto; padding: 12px; display: none; z-index: 5; }
.panel.active { display: block; }
.section-lbl { font-size: 10px; color: #6d4aff; text-transform: uppercase; margin: 12px 0 8px; font-weight: bold; }
.card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px; margin-bottom: 8px; min-height: 70px; }
.card.danger { border-color: #ff6b6b; }
.card-row { display: flex; justify-content: space-between; align-items: center; }
.card-title { font-size: 13px; font-weight: bold; }
.card-sub { font-size: 10px; color: #888; margin-top: 4px; }
.card-reward { color: #ffd700; font-weight: bold; font-size: 13px; }
.progress { height: 4px; background: #333; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; transition: width 0.3s ease; }
.btn { display: block; width: 100%; padding: 9px 0; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 6px; font-size: 12px; margin-top: 6px; cursor: pointer; font-weight: bold; }
.btn:active { background: #3ddc97; transform: scale(0.98); }
.btn-danger { background: #ff6b6b; color: #fff; }
.btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
.badge { padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; }
.badge-1 { background: #888; color: #fff; }
.badge-2 { background: #6d4aff; color: #fff; }
.badge-3 { background: #3498db; color: #fff; }
.badge-4 { background: #4ecca3; color: #1a1a2e; }
.badge-5 { background: #ffd700; color: #1a1a2e; }
.badge-ok { background: #4ecca3; color: #1a1a2e; }
.badge-warn { background: #f39c12; color: #1a1a2e; }
.badge-err { background: #ff6b6b; color: #fff; }
.truck-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
#toast-area { position: fixed; top: 60px; left: 8px; right: 8px; z-index: 100; pointer-events: none; }
.toast { background: rgba(26, 26, 46, 0.95); border-left: 3px solid #6d4aff; border-radius: 6px; padding: 10px 14px; font-size: 11px; margin-bottom: 6px; animation: slideIn 0.2s; }
.toast.success { border-left-color: #4ecca3; }
.toast.error { border-left-color: #ff6b6b; }
.toast.info { border-left-color: #3498db; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 50; display: none; justify-content: center; align-items: center; padding: 16px; overflow-y: auto; }
.modal.show { display: flex; }
.modal-box { background: #1a1a2e; border: 1px solid #6d4aff; border-radius: 12px; padding: 16px; max-width: 340px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-title { color: #6d4aff; margin-bottom: 12px; font-size: 15px; font-weight: bold; }
.modal-info { font-size: 11px; color: #ccc; margin-bottom: 12px; }
.dispatch-item, .driver-item { background: #16213e; border: 1px solid #2a2a4e; border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
.dispatch-item:active, .driver-item:active { border-color: #6d4aff; }
.empty-msg { text-align: center; color: #666; font-size: 11px; padding: 24px; }
.contract-info { background: #1a1a2e; border: 1px solid #6d4aff; border-radius: 6px; padding: 8px; margin-bottom: 6px; }
</style>
</head>
<body>

<div id="top-bar">
  <div class="top-item"><span class="lbl">CASH</span><span class="val money" id="cash">5,000</span></div>
  <div class="top-item"><span class="lbl">REV</span><span class="val money" id="rev">0</span></div>
  <div class="top-item"><span class="lbl">DAY</span><span class="val" id="day">1</span></div>
  <div class="top-item"><span class="lbl">CTR</span><span class="val" id="ctr">0/5</span></div>
  <div class="top-item"><span class="lbl">HUB</span><span class="val" id="hub">0</span></div>
</div>

<canvas id="canvas"></canvas>

<div id="toast-area"></div>

<div class="panel active" id="tab-orders"><div id="orders-list"></div></div>
<div class="panel" id="tab-contracts"><div id="contracts-list"></div></div>
<div class="panel" id="tab-fleet"><div id="fleet-list"></div></div>
<div class="panel" id="tab-drivers"><div id="drivers-list"></div></div>
<div class="panel" id="tab-shop"><div id="shop-list"></div></div>

<div id="nav">
  <button class="nav-btn active" data-tab="orders"><span class="nav-icon">📋</span>Orders</button>
  <button class="nav-btn" data-tab="contracts"><span class="nav-icon">🤝</span>Contracts</button>
  <button class="nav-btn" data-tab="fleet"><span class="nav-icon">🚚</span>Fleet</button>
  <button class="nav-btn" data-tab="drivers"><span class="nav-icon">👨‍✈️</span>Drivers</button>
  <button class="nav-btn" data-tab="shop"><span class="nav-icon">🏪</span>Shop</button>
</div>

<div class="modal" id="dispatch-modal">
  <div class="modal-box">
    <div class="modal-title">Dispatch Truck</div>
    <div class="modal-info" id="dispatch-info"></div>
    <div id="dispatch-items"></div>
    <button class="btn" style="background:#444;color:#fff" onclick="closeModal('dispatch-modal')">Close</button>
  </div>
</div>

<div class="modal" id="driver-modal">
  <div class="modal-box">
    <div class="modal-title">Assign Driver</div>
    <div class="modal-info" id="driver-info"></div>
    <div id="driver-items"></div>
    <button class="btn" style="background:#444;color:#fff" onclick="closeModal('driver-modal')">Close</button>
  </div>
</div>

<script>
// ======================
// CONFIGURATION
// ======================
var FT = {
  bulk: { name: 'Bulk', icon: '⛏️', unit: 't' },
  container: { name: 'Container', icon: '📦', unit: 'TEU' },
  cool: { name: 'Refrigerated', icon: '❄️', unit: 'pal' },
  special: { name: 'Special', icon: '⚠️', unit: 'unt' }
};

// 5 TRUCK TIERS - Each 2x cost
var TT = {
  t1: { name: 'Basic Van', cost: 2000, capBase: 3, capVar: 2, speed: 3, color: '#888', maint: 30, compat: ['bulk', 'container'] },
  t2: { name: 'Standard Truck', cost: 4000, capBase: 6, capVar: 3, speed: 4, color: '#6d4aff', maint: 60, compat: ['bulk', 'container', 'cool'] },
  t3: { name: 'Premium Trailer', cost: 8000, capBase: 10, capVar: 5, speed: 5, color: '#3498db', maint: 120, compat: ['all'] },
  t4: { name: 'Executive Semi', cost: 16000, capBase: 18, capVar: 7, speed: 6, color: '#4ecca3', maint: 240, compat: ['all'] },
  t5: { name: 'Elite Mega', cost: 32000, capBase: 30, capVar: 10, speed: 7, color: '#ffd700', maint: 480, compat: ['all'] }
};

// 5 DRIVER TIERS - Each 2x wage
var DT = {
  d1: { name: 'Novice', wage: 200, speedMod: 0.8, bonus: 0 },
  d2: { name: 'Qualified', wage: 400, speedMod: 1.0, bonus: 1 },
  d3: { name: 'Expert', wage: 800, speedMod: 1.1, bonus: 3 },
  d4: { name: 'Master', wage: 1600, speedMod: 1.2, bonus: 5 },
  d5: { name: 'Legend', wage: 3200, speedMod: 1.3, bonus: 8 }
};

// 5 HUB TIERS - Each 2x cost
var HUB = {
  h1: { name: 'Small Depot', cost: 5000, capacity: 3, maint: 100 },
  h2: { name: 'Regional Hub', cost: 10000, capacity: 6, maint: 200 },
  h3: { name: 'Distribution Ctr', cost: 20000, capacity: 10, maint: 400 },
  h4: { name: 'Logistics Ctr', cost: 40000, capacity: 15, maint: 800 },
  h5: { name: 'Global Hub', cost: 80000, capacity: 25, maint: 1600 }
};

// COMPANIES FOR CONTRACTS
var COMPANIES = [
  { name: 'TechCorp Industries', ft: ['container', 'cool'], signFee: 1000, weeklyVol: 150, finePct: 0.30 },
  { name: 'AutoParts United', ft: ['bulk', 'special'], signFee: 1500, weeklyVol: 250, finePct: 0.35 },
  { name: 'FreshFood Co', ft: ['cool'], signFee: 800, weeklyVol: 100, finePct: 0.25 },
  { name: 'BuildMaterials Ltd', ft: ['bulk', 'special'], signFee: 2000, weeklyVol: 350, finePct: 0.40 },
  { name: 'Retail Chain Global', ft: ['container', 'cool'], signFee: 1200, weeklyVol: 200, finePct: 0.30 }
];

// CITIES/LOCATIONS ON MAP (VISIBLE!)
var LOC = {
  downtown: { name: 'Downtown', x: 0.25, y: 0.38, ft: ['container'] },
  industrial: { name: 'Industrial', x: 0.75, y: 0.68, ft: ['bulk', 'special', 'container'] },
  port: { name: 'Port', x: 0.15, y: 0.82, ft: ['bulk', 'container', 'cool'] },
  airport: { name: 'Airport', x: 0.85, y: 0.22, ft: ['cool', 'container', 'special'] },
  suburb: { name: 'Suburb', x: 0.52, y: 0.52, ft: ['container', 'cool'] },
  quarry: { name: 'Quarry', x: 0.12, y: 0.15, ft: ['bulk'] },
  farm: { name: 'Farm', x: 0.88, y: 0.85, ft: ['bulk', 'cool'] }
};

var NAMES = ['Alex', 'Jordan', 'Taylor', 'Casey', 'Sam', 'Riley', 'Morgan', 'Quinn'];

var CFG = {
  startCash: 5000,
  maxFleet: 20,
  maxContracts: 5,
  orderInterval: 8000,
  dayTicks: 3600,
  hireCost: 300,
  latePct: 0.5,
  finePct: 0.25,
  fuelPerTrip: 0.15,
  repairAmt: 30
};

// ======================
// GAME STATE
// ======================
var G = {
  cash: 5000,
  revenue: 0,
  day: 1,
  tick: 0,
  uiTick: 0,
  fleet: [],
  drivers: [],
  hubs: [],
  contracts: [],
  orders: [],
  canvas: null,
  ctx: null,
  W: 0,
  H: 0,
  truckId: 0,
  orderId: 0,
  contractId: 0,
  hubId: 0,
  lastOrderTime: 0,
  dispatchTruckId: 0,
  driverTruckId: 0
};

// ======================
// HELPERS
// ======================
function uid(type) {
  if (type === 'truck') return ++G.truckId;
  if (type === 'order') return ++G.orderId;
  if (type === 'contract') return ++G.contractId;
  if (type === 'hub') return ++G.hubId;
  return 0;
}

function createTruck(tierKey) {
  var cfg = TT[tierKey];
  var cap = Math.floor(cfg.capBase + Math.random() * cfg.capVar);
  return {
    id: uid('truck'),
    type: tierKey,
    capacity: cap,
    x: 0.5, y: 0.5,
    tx: 0.5, ty: 0.5,
    state: 'idle',
    fuel: 1.0,
    damage: 0,
    assignedDriver: null,
    orderId: null,
    cargo: 0,
    homeHub: 1
  };
}

function createDriver(tierKey) {
  var cfg = DT[tierKey];
  var name = NAMES[Math.floor(Math.random() * NAMES.length)];
  return {
    id: G.drivers.length,
    type: tierKey,
    name: name,
    wage: cfg.wage,
    speedMod: cfg.speedMod,
    bonus: cfg.bonus,
    xp: 0,
    truckId: null,
    homeHub: 1
  };
}

function toast(msg, type) {
  var area = document.getElementById('toast-area');
  var el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    setTimeout(function() { el.remove(); }, 300);
  }, 2500);
  if (area.children.length > 5) area.removeChild(area.firstChild);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// ======================
// INITIALIZATION
// ======================
window.onload = function() {
  initCanvas();
  window.addEventListener('resize', initCanvas);
  setupNav();
  
  // Starter truck, driver, hub
  G.fleet.push(createTruck('t1'));
  G.drivers.push(createDriver('d1'));
  G.hubs.push({
    id: uid('hub'),
    name: 'Home Base',
    type: 'h1',
    x: 0.5, y: 0.5,
    capacity: 3,
    maint: 100
  });
  
  // Link starter driver to truck
  G.drivers[0].truckId = G.fleet[0].id;
  G.fleet[0].homeHub = G.hubs[0].id;
  G.fleet[0].tx = G.hubs[0].x;
  G.fleet[0].ty = G.hubs[0].y;
  
  renderAll();
  startGame();
  console.log('Game initialized!');
};

function initCanvas() {
  var c = document.getElementById('canvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight - 98;
  G.W = c.width;
  G.H = c.height;
  G.canvas = c;
  G.ctx = c.getContext('2d');
}

function setupNav() {
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    };
  });
}

// ======================
// ACTIONS - BUY/HIRE/SIGN
// ======================
window.buyTruck = function(tierKey) {
  var cfg = TT[tierKey];
  if (G.cash < cfg.cost) { toast('Need $' + cfg.cost, 'error'); return; }
  if (G.fleet.length >= CFG.maxFleet) { toast('Fleet full!', 'error'); return; }
  G.cash -= cfg.cost;
  var t = createTruck(tierKey);
  var hub = G.hubs[0];
  if (hub) { t.x = hub.x; t.y = hub.y; t.tx = hub.x; t.ty = hub.y; }
  G.fleet.push(t);
  toast('Bought ' + cfg.name + '!', 'success');
  renderFleet();
  renderShop();
  renderTopBar();
};

window.hireDriver = function(tierKey) {
  var idx = Object.keys(DT).indexOf(tierKey);
  var cost = CFG.hireCost * (idx + 1);
  if (G.cash < cost) { toast('Need $' + cost, 'error'); return; }
  if (G.drivers.length >= CFG.maxFleet) { toast('Max drivers!', 'error'); return; }
  G.cash -= cost;
  var d = createDriver(tierKey);
  G.drivers.push(d);
  toast('Hired ' + d.name + '!', 'success');
  renderDrivers();
  renderShop();
  renderTopBar();
};

window.buyHub = function(tierKey) {
  var cfg = HUB[tierKey];
  if (G.cash < cfg.cost) { toast('Need $' + cfg.cost, 'error'); return; }
  if (G.hubs.length >= 5) { toast('Max 5 hubs!', 'error'); return; }
  G.cash -= cfg.cost;
  var x = 0.2 + Math.random() * 0.6;
  var y = 0.2 + Math.random() * 0.6;
  G.hubs.push({
    id: uid('hub'),
    name: cfg.name,
    type: tierKey,
    x: x, y: y,
    capacity: cfg.capacity,
    maint: cfg.maint
  });
  toast('Purchased ' + cfg.name + '!', 'success');
  renderAll();
};

window.signContract = function(companyIdx) {
  var comp = COMPANIES[companyIdx];
  if (G.cash < comp.signFee) { toast('Need $' + comp.signFee, 'error'); return; }
  var already = G.contracts.some(function(c) { return c.company === comp.name; });
  if (already) { toast('Already signed!', 'error'); return; }
  if (G.contracts.length >= CFG.maxContracts) { toast('Max contracts!', 'error'); return; }
  G.cash -= comp.signFee;
  G.contracts.push({
    id: uid('contract'),
    company: comp.name,
    companyData: comp,
    weeklyVol: 0,
    weeklyGoal: comp.weeklyVol,
    active: true
  });
  toast('Signed ' + comp.name + '! Weekly goal: ' + comp.weeklyVol, 'success');
  renderContracts();
  renderTopBar();
};

window.cancelContract = function(cid) {
  var c = G.contracts.find(function(x) { return x.id === cid; });
  if (c) { c.active = false; G.contracts = G.contracts.filter(function(x) { return x !== c; }); }
  toast('Contract cancelled', 'info');
  renderContracts();
  renderTopBar();
};

window.acceptOrder = function(oid) {
  var o = G.orders.find(function(x) { return x.id === oid; });
  if (!o) return;
  o.status = 'accepted';
  o.acceptedTick = G.tick;
  G.orders = G.orders.filter(function(x) { return x.id !== oid; });
  G.orders.push(o);
  toast('Order accepted! Dispatch from Fleet.', 'success');
  renderOrders();
};

// ======================
// DISPATCH SYSTEM - MANUAL ONLY
// ======================
window.openDispatch = function(truckId) {
  G.dispatchTruckId = truckId;
  var t = G.fleet.find(function(x) { return x.id === truckId; });
  if (!t) return;
  
  var cfg = TT[t.type];
  var drv = (t.assignedDriver !== null && t.assignedDriver !== undefined) ? G.drivers[t.assignedDriver] : null;
  
  document.getElementById('dispatch-info').innerHTML =
    '<b>' + cfg.name + '</b> (Cap: ' + t.capacity + ') | Fuel: ' + Math.round(t.fuel * 100) + '% | Damage: ' + Math.round(t.damage) + '%' +
    '<br>Driver: ' + (drv ? drv.name + ' (' + DT[drv.type].name + ')' : '<span style="color:#ff6b6b">NONE</span>');
  
  var list = document.getElementById('dispatch-items');
  var html = '';
  
  if (t.state === 'idle') {
    if (drv) {
      var acts = G.orders.filter(function(o) { return o.status === 'accepted'; });
      if (acts.length > 0) {
        html += '<div class="section-lbl">Available Orders</div>';
        acts.forEach(function(o) {
          var ok = cfg.compat.indexOf(o.ft) >= 0 || cfg.compat.indexOf('all') >= 0;
          html += '<div class="dispatch-item" ontouchstart="dispatchToPickup('+t.id+','+o.id+')" onclick="dispatchToPickup('+t.id+','+o.id+')">' +
            '<span>' + FT[o.ft].icon + ' ' + o.from.name + ' → ' + o.to.name + '</span><br>' +
            '<span style="color:#ffd700">$' + o.reward + ' | ' + o.units + FT[o.ft].unit + '</span>' +
            (ok ? '' : '<br><span style="color:#ff6b6b;font-size:9px">Incompatible</span>') +
            '</div>';
        });
      } else {
        html += '<div class="empty-msg">No accepted orders.</div>';
      }
    } else {
      html += '<div class="empty-msg"><span style="color:#ff6b6b">Assign driver first!</span></div>';
    }
    
    html += '<div class="section-lbl">Return to Hub</div>';
    G.hubs.forEach(function(h) {
      html += '<div class="dispatch-item" ontouchstart="returnToHub('+t.id+','+h.id+')" onclick="returnToHub('+t.id+','+h.id+')">🏠 ' + h.name + '</div>';
    });
  } else {
    var o = G.orders.find(function(x) { return x.id === t.orderId; });
    if (o) {
      html += '<div class="section-lbl">En Route</div>';
      html += '<div class="dispatch-item" style="opacity:0.6">' + t.state + ' → ' + (t.state === 'to_pickup' ? o.from.name : o.to.name) + '</div>';
    }
    html += '<div class="section-lbl">Abort</div>';
    G.hubs.forEach(function(h) {
      html += '<div class="dispatch-item" ontouchstart="returnToHub('+t.id+','+h.id+')" onclick="returnToHub('+t.id+','+h.id+')">🏠 Abort to ' + h.name + '</div>';
    });
  }
  
  list.innerHTML = html;
  document.getElementById('dispatch-modal').classList.add('show');
};

window.closeDispatch = function() { closeModal('dispatch-modal'); };

window.dispatchToPickup = function(tid, oid) {
  var t = G.fleet.find(function(x) { return x.id === tid; });
  var o = G.orders.find(function(x) { return x.id === oid; });
  if (!t || !o) return;
  
  if (t.fuel < 0.15) { toast('Needs fuel! Return to hub.', 'error'); return; }
  if (t.damage > 60) { toast('Too damaged! Repair at hub.', 'error'); return; }
  
  t.orderId = o.id;
  t.state = 'to_pickup';
  t.tx = o.from.x;
  t.ty = o.from.y;
  o.status = 'in_transit';
  o.assignedTrucks = o.assignedTrucks || [];
  if (o.assignedTrucks.indexOf(t.id) < 0) o.assignedTrucks.push(t.id);
  
  toast('Dispatched to ' + o.from.name + '!', 'success');
  closeModal('dispatch-modal');
  renderFleet();
  renderOrders();
};

window.returnToHub = function(tid, hid) {
  var t = G.fleet.find(function(x) { return x.id === tid; });
  var h = G.hubs.find(function(x) { return x.id === hid; });
  if (!t || !h) return;
  
  t.tx = h.x;
  t.ty = h.y;
  t.state = 'returning';
  t.homeHub = hid;
  
  // Release from current order if any
  if (t.orderId) {
    var o = G.orders.find(function(x) { return x.id === t.orderId; });
    if (o && o.assignedTrucks) {
      var idx = o.assignedTrucks.indexOf(t.id);
      if (idx >= 0) o.assignedTrucks.splice(idx, 1);
    }
    t.orderId = null;
    t.cargo = 0;
  }
  
  toast('Returning to ' + h.name + ' for rest/fuel/repair', 'info');
  closeModal('dispatch-modal');
  renderFleet();
};

// DRIVER ASSIGNMENT
// ======================
window.openDriver = function(truckId) {
  G.driverTruckId = truckId;
  var t = G.fleet.find(function(x) { return x.id === truckId; });
  if (!t) return;
  
  var cfg = TT[t.type];
  var cur = (t.assignedDriver !== null && t.assignedDriver !== undefined) ? G.drivers[t.assignedDriver] : null;
  
  document.getElementById('driver-info').innerHTML =
    '<b>' + cfg.name + '</b> (Cap: ' + t.capacity + ')' +
    '<br>Current: ' + (cur ? cur.name + ' (' + DT[cur.type].name + ')' : '<span style="color:#ff6b6b">None</span>');
  
  var list = document.getElementById('driver-items');
  var avail = G.drivers.filter(function(d) { return d.truckId === null || d.truckId === t.id; });
  
  list.innerHTML = avail.length > 0 ? avail.map(function(d) {
    var ti = Object.keys(DT).indexOf(d.type);
    return '<div class="driver-item" ontouchstart="assignDriver('+d.id+')" onclick="assignDriver('+d.id+')">' +
      d.name + ' (' + DT[d.type].name + ') | XP: ' + d.xp +
      '<br><span class="badge badge-' + (ti+1) + '">Tier ' + (ti+1) + '</span></div>';
  }).join('') : '<div class="empty-msg">No available drivers. Hire in Shop!</div>';
  
  document.getElementById('driver-modal').classList.add('show');
};

window.closeDriver = function() { closeModal('driver-modal'); };

window.assignDriver = function(did) {
  var t = G.fleet.find(function(x) { return x.id === G.driverTruckId; });
  if (!t) return;
  
  // Unassign old driver
  if (t.assignedDriver !== null && t.assignedDriver !== undefined) {
    var old = G.drivers[t.assignedDriver];
    if (old) old.truckId = null;
  }
  
  // Assign new driver
  var d = G.drivers[did];
  if (d.truckId !== null && d.truckId !== t.id) {
    var oldTr = G.fleet.find(function(x) { return x.id === d.truckId; });
    if (oldTr) oldTr.assignedDriver = null;
  }
  
  t.assignedDriver = did;
  d.truckId = t.id;
  
  toast(d.name + ' assigned to ' + TT[t.type].name, 'success');
  closeModal('driver-modal');
  renderFleet();
  renderDrivers();
};

// ======================
// ORDER GENERATION
// ======================
function generateOrders() {
  var acts = G.contracts.filter(function(c) { return c.active; });
  if (acts.length === 0) return;
  
  acts.forEach(function(c) {
    if (Math.random() > 0.6) return;
    var ft = c.companyData.ft[Math.floor(Math.random() * c.companyData.ft.length)];
    var locs = Object.values(LOC).filter(function(l) { return l.ft.indexOf(ft) >= 0; });
    if (locs.length < 2) return;
    
    var from = locs[Math.floor(Math.random() * locs.length)];
    var to = locs[Math.floor(Math.random() * locs.length)];
    while (to === from) to = locs[Math.floor(Math.random() * locs.length)];
    
    var units = Math.floor(5 + Math.random() * 20);
    var dist = Math.abs(from.x - to.x) + Math.abs(from.y - to.y);
    var reward = Math.round(units * 15 * (1 + dist) * (0.8 + Math.random() * 0.4));
    
    G.orders.push({
      id: uid('order'),
      ft: ft,
      units: units,
      delivered: 0,
      from: from,
      to: to,
      reward: reward,
      status: 'pending',
      acceptedTick: 0,
      assignedTrucks: []
    });
  });
  renderOrders();
}

// ======================
// MOVE & ARRIVAL
// ======================
function handleArrival(t) {
  if (t.state === 'to_pickup') {
    var o = G.orders.find(function(x) { return x.id === t.orderId; });
    if (!o) { t.state = 'idle'; t.orderId = null; return; }
    
    var remaining = o.units - o.delivered;
    t.cargo = Math.min(t.capacity, remaining);
    t.state = 'to_dropoff';
    t.tx = o.to.x;
    t.ty = o.to.y;
    toast('Loaded ' + t.cargo + FT[o.ft].unit, 'info');
    
  } else if (t.state === 'to_dropoff') {
    var o = G.orders.find(function(x) { return x.id === t.orderId; });
    if (!o) { t.state = 'idle'; t.cargo = 0; t.orderId = null; return; }
    
    o.delivered += t.cargo;
    t.cargo = 0;
    
    // Wear and tear
    t.fuel = Math.max(0, t.fuel - CFG.fuelPerTrip);
    if (Math.random() < 0.03) t.damage = Math.min(100, t.damage + 15);
    
    if (o.delivered >= o.units) {
      // Order complete
      var elapsed = G.tick - o.acceptedTick;
      var late = elapsed > 5400;
      var reward = late ? Math.round(o.reward * CFG.latePct) : o.reward;
      G.cash += reward;
      G.revenue += reward;
      
      // XP
      if (t.assignedDriver !== null) {
        var d = G.drivers[t.assignedDriver];
        d.xp += Math.round(reward / 50);
        promoteDriver(d);
      }
      
      // Contract volume
      var c = G.contracts.find(function(x) { return x.id === o.contractId; });
      if (c) { c.weeklyVol += o.units; }
      
      toast('ORDER COMPLETE! +$' + reward + (late ? ' (LATE)' : ''), 'success');
      
      // Release trucks
      o.assignedTrucks.forEach(function(tid) {
        var tr = G.fleet.find(function(x) { return x.id === tid; });
        if (tr) { tr.state = 'idle'; tr.orderId = null; }
      });
      
      G.orders = G.orders.filter(function(x) { return x.id !== o.id; });
      
    } else {
      // Partial delivery - return to pickup
      t.state = 'to_pickup';
      t.tx = o.from.x;
      t.ty = o.from.y;
      toast('Partial: ' + o.delivered + '/' + o.units, 'info');
    }
    
  } else if (t.state === 'returning') {
    var h = G.hubs.find(function(x) { return x.id === t.homeHub; });
    if (h) {
      t.x = h.x; t.y = h.y;
      t.fuel = 1.0;
      t.damage = Math.max(0, t.damage - CFG.repairAmt);
      var cost = Math.round(h.maint * 0.1);
      G.cash -= cost;
      if (t.assignedDriver !== null) {
        G.drivers[t.assignedDriver].xp += 5; // Bonus for resting
      }
      toast('Refueled & repaired at ' + h.name + ' (-$' + cost + ')', 'info');
    }
    t.state = 'idle';
    t.cargo = 0;
  }
  
  renderAll();
}

function promoteDriver(d) {
  var thresh = [0, 500, 1500, 3000, 6000];
  var tiers = Object.keys(DT);
  var newTier = tiers[0];
  for (var i = 0; i < thresh.length; i++) if (d.xp >= thresh[i]) newTier = tiers[i];
  if (newTier !== d.type) {
    d.type = newTier;
    d.wage = DT[newTier].wage;
    d.speedMod = DT[newTier].speedMod;
    d.bonus = DT[newTier].bonus;
    toast(d.name + ' promoted to ' + DT[newTier].name + '!', 'success');
  }
}

// ======================
// DRAWING - SHOWS CITIES!
// ======================
function draw() {
  var ctx = G.ctx;
  var W = G.W, H = G.H;
  if (W === 0 || H === 0) return;
  
  // Background
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 0, W, H);
  
  // Grid
  ctx.strokeStyle = 'rgba(109,74,255,0.08)';
  ctx.lineWidth = 1;
  for (var x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (var y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  
  // HUBS (Green circles)
  G.hubs.forEach(function(h) {
    var hx = h.x * W, hy = h.y * H;
    ctx.fillStyle = 'rgba(78,204,163,0.25)';
    ctx.beginPath(); ctx.arc(hx, hy, 50, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4ecca3';
    ctx.beginPath(); ctx.arc(hx, hy, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(h.name, hx, hy - 18);
  });
  
  // LOCATIONS/CITIES (Blue circles with names - VISIBLE!)
  Object.entries(LOC).forEach(function(kv) {
    var l = kv[1], lx = l.x * W, ly = l.y * H;
    ctx.fillStyle = 'rgba(109,74,255,0.15)';
    ctx.beginPath(); ctx.arc(lx, ly, 35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#6d4aff';
    ctx.beginPath(); ctx.arc(lx, ly, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(kv[0], lx, ly - 18);
    ctx.font = '8px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(l.ft.map(function(f) { return FT[f].icon; }).join(' '), lx, ly + 20);
  });
  
  // Orders (pickup/dropoff points)
  G.orders.forEach(function(o) {
    if (o.status !== 'in_transit') return;
    var opx = o.from.x * W, opy = o.from.y * H;
    var dpox = o.to.x * W, dpoy = o.to.y * H;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(opx, opy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f39c12';
    ctx.beginPath(); ctx.arc(dpox, dpoy, 6, 0, Math.PI * 2); ctx.fill();
  });
  
  // TRUCKS
  G.fleet.forEach(function(t) {
    var cfg = TT[t.type];
    var sz = t.type === 't5' ? 14 : (t.type === 't4' ? 12 : (t.type === 't3' ? 10 : 8));
    
    ctx.shadowColor = cfg.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = cfg.color;
    ctx.fillRect(t.x * W - sz, t.y * H - sz / 2, sz * 2, sz);
    ctx.shadowBlur = 0;
    
    // Status indicator (fuel/damage warning)
    ctx.fillStyle = (t.fuel < 0.3 || t.damage > 60) ? '#ff6b6b' : '#4ecca3';
    ctx.beginPath(); ctx.arc(t.x * W - sz - 2, t.y * H, 3, 0, Math.PI * 2); ctx.fill();
    
    // Cargo indicator
    if (t.cargo > 0) {
      ctx.fillStyle = '#4ecca3';
      ctx.fillRect(t.x * W - sz + 3, t.y * H - 2, 4, 4);
    }
    
    // Route line
    if (t.state !== 'idle' && t.state !== 'returning') {
      ctx.strokeStyle = 'rgba(109,74,255,0.4)';
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(t.x * W, t.y * H); ctx.lineTo(t.tx * W, t.ty * H); ctx.stroke();
      ctx.setLineDash([]);
    }
  });
}

// ======================
// GAME LOOP
// ======================
function update() {
  G.tick++;
  
  // Day cycle
  if (G.tick % CFG.dayTicks === 0) {
    G.day++;
    
    // Calculate costs
    var wages = G.drivers.reduce(function(s, d) { return s + DT[d.type].wage; }, 0);
    var maint = G.fleet.reduce(function(s, t) { return s + TT[t.type].maint; }, 0);
    var hubMaint = G.hubs.reduce(function(s, h) { return s + h.maint; }, 0);
    var total = wages + maint + hubMaint;
    
    G.cash -= total;
    toast('Day ' + G.day + ' | Expenses: $' + total, 'info');
    
    // Weekly check (every 7 days)
    checkWeeklyVolumes();
  }
  
  // Move trucks
  G.fleet.forEach(function(t) {
    if (t.state === 'idle' || t.state === 'completed' || t.state === 'returning' && t.fuel >= 1) return;
    
    var cfg = TT[t.type];
    var drv = (t.assignedDriver !== null && t.assignedDriver !== undefined) ? G.drivers[t.assignedDriver] : null;
    var speedMod = drv ? DT[drv.type].speedMod : 1.0;
    var spd = cfg.speed * 0.0008 * speedMod;
    
    var dx = t.tx - t.x;
    var dy = t.ty - t.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 0.01) {
      handleArrival(t);
    } else {
      t.x += (dx / dist) * spd;
      t.y += (dy / dist) * spd;
    }
  });
  
  // Expired orders
  G.orders.forEach(function(o) {
    if (o.status !== 'accepted' && o.status !== 'in_transit') return;
    var elapsed = G.tick - o.acceptedTick;
    if (elapsed > 5400) {
      if (o.delivered > 0) {
        var partial = Math.round(o.reward * CFG.latePct * (o.delivered / o.units));
        G.cash += partial; G.revenue += partial;
        toast('Order expired late: +$' + partial, 'error');
      } else {
        var fine = Math.round(o.reward * CFG.finePct);
        G.cash -= fine;
        toast('Order EXPIRED! Fine: -$' + fine, 'error');
      }
      o.assignedTrucks = o.assignedTrucks || [];
      o.assignedTrucks.forEach(function(tid) {
        var tr = G.fleet.find(function(x) { return x.id === tid; });
        if (tr) { tr.state = 'idle'; tr.orderId = null; }
      });
      G.orders = G.orders.filter(function(x) { return x.id !== o.id; });
    }
  });
  
  // UI refresh
  G.uiTick++;
  if (G.uiTick % 20 === 0) {
    renderAll();
  }
}

function checkWeeklyVolumes() {
  var totalFine = 0;
  G.contracts.forEach(function(c) {
    if (!c.active) return;
    if (c.weeklyVol < c.weeklyGoal) {
      var shortage = c.weeklyGoal - c.weeklyVol;
      var fine = Math.round(shortage * c.companyData.finePct * 100);
      totalFine += fine;
      c.active = false;
      toast(c.company + ' MISSED goal! Fine: -$' + fine, 'error');
    }
    c.weeklyVol = 0;
  });
  G.cash -= totalFine;
}

function animate() {
  draw();
  update();
  requestAnimationFrame(animate);
}

function startGame() {
  animate();
  setInterval(generateOrders, CFG.orderInterval);
}

function renderOrders() {

    html += '<div class="section-lbl">Pending — Tap to Accept</div>';

function renderShop() {
  var c = document.getElementById('shop-list');
  var html = '';
  
  // Trucks
  html += '<div class="section-lbl">Trucks (5 Tiers, 2× Price Each)</div>';
  Object.keys(TT).forEach(function(key, i) {
    var cfg = TT[key];
    var can = G.cash >= cfg.cost && G.fleet.length < CFG.maxFleet;
    html += '<div class="card"><div class="card-row"><span class="card-title"><span class="truck-dot" style="background:' + cfg.color + '"></span>' + cfg.name + '</span><span class="card-reward">$' + cfg.cost.toLocaleString() + '</span></div>' +
      '<div class="card-sub">Cap: ' + cfg.capBase + '-' + (cfg.capBase + cfg.capVar) + ' | Speed: ' + cfg.speed + ' | Maint: $' + cfg.maint + '/day</div>' +
      '<div class="card-sub">Freight: ' + cfg.compat.map(function(f) { return FT[f] ? FT[f].icon : f; }).join('/') + '</div>' +
      '<button class="btn btn-buy" ' + (can ? '' : 'disabled') + ' onclick="buyTruck(\'' + key + '\')">' + (can ? 'Buy' : (G.cash < cfg.cost ? 'Need $' : 'Full')) + '</button></div>';
  });
  
  // Drivers
  html += '<div class="section-lbl">Drivers (5 Tiers, 2× Wage Each)</div>';
  Object.keys(DT).forEach(function(key, i) {
    var cfg = DT[key];
    var cost = CFG.hireCost * (i + 1);
    var can = G.cash >= cost && G.drivers.length < CFG.maxFleet;
    html += '<div class="card"><div class="card-row"><span class="card-title">👨‍✈️ ' + cfg.name + '</span><span class="card-reward">$' + cost + '</span></div>' +
      '<div class="card-sub">Wage: $' + cfg.wage + '/day | Speed: ' + cfg.speedMod + 'x | Bonus: +' + cfg.bonus + '</div>' +
      '<button class="btn btn-buy" ' + (can ? '' : 'disabled') + ' onclick="hireDriver(\'' + key + '\')">' + (can ? 'Hire' : (G.cash < cost ? 'Need $' : 'Full')) + '</button></div>';
  });
  
  // Hubs
  html += '<div class="section-lbl">Hubs (5 Tiers, 2× Price Each)</div>';
  Object.keys(HUB).forEach(function(key, i) {
    var cfg = HUB[key];
    var can = G.cash >= cfg.cost && G.hubs.length < 5;
    html += '<div class="card"><div class="card-row"><span class="card-title">🏠 ' + cfg.name + '</span><span class="card-reward">$' + cfg.cost.toLocaleString() + '</span></div>' +
      '<div class="card-sub">Capacity: ' + cfg.capacity + ' trucks | Maint: $' + cfg.maint + '/day</div>' +
      '<button class="btn btn-buy" ' + (can ? '' : 'disabled') + ' onclick="buyHub(\'' + key + '\')">' + (can ? 'Buy' : (G.cash < cfg.cost ? 'Need $' : 'Full')) + '</button></div>';
  });
  
  c.innerHTML = html;
}
</script>
</body>
</html>
