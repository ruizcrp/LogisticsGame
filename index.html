<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logistics Game</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: -apple-system, 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            touch-action: manipulation;
        }

        /* ---- TOP BAR ---- */
        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            padding: 0 12px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4e;
            flex-shrink: 0;
        }
        .top-stat { display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .top-stat .label { color: #888; font-size: 9px; }
        .top-stat .val { font-weight: bold; }
        .money { color: #4ecca3; }
        .day-val { color: #6d4aff; }

        /* ---- MAIN LAYOUT ---- */
        #main-wrap {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 44px - 140px);
            flex: 1;
            position: relative;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0f3460;
        }

        /* ---- BOTTOM PANEL ---- */
        #bottom-panel {
            height: 140px;
            background: #16213e;
            border-top: 1px solid #2a2a4e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #tab-bar {
            display: flex;
            height: 36px;
            border-bottom: 1px solid #2a2a4e;
        }
        .tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #888;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }
        .tab.active { color: #6d4aff; border-bottom-color: #6d4aff; }
        .tab-badge {
            background: #ff6b6b;
            color: #fff;
            border-radius: 8px;
            padding: 1px 6px;
            font-size: 9px;
            margin-left: 4px;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: none;
        }
        .tab-content.active { display: block; }
        .tab-content::-webkit-scrollbar { width: 4px; }
        .tab-content::-webkit-scrollbar-thumb { background: #6d4aff; border-radius: 2px; }

        /* ---- CARDS ---- */
        .card {
            background: #1a1a2e;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
            border: 1px solid #2a2a4e;
            cursor: pointer;
        }
        .card.selected { border-color: #4ecca3; background: #1e2e4e; }
        .card.busy { opacity: 0.5; cursor: default; }
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 12px; font-weight: bold; }
        .card-sub { font-size: 9px; color: #888; margin-top: 2px; }
        .card-reward { color: #ffd700; font-weight: bold; font-size: 13px; }

        /* ---- BUTTONS ---- */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary { background: #6d4aff; color: #fff; }
        .btn-buy { background: #4ecca3; color: #1a1a2e; }
        .btn-danger { background: #ff6b6b; color: #fff; }
        .btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }

        /* ---- MODAL ---- */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 50;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #modal-overlay.show { display: flex; }
        #modal-box {
            background: #1a1a2e;
            border: 1px solid #6d4aff;
            border-radius: 12px;
            padding: 16px;
            max-width: 360px;
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* ---- TOAST (non-blocking) ---- */
        #toast-area {
            position: fixed;
            bottom: 150px;
            left: 8px;
            right: 8px;
            z-index: 60;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .toast {
            background: rgba(26,26,46,0.92);
            border-left: 3px solid #6d4aff;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 10px;
            max-width: 320px;
            animation: toastIn 0.25s ease;
        }
        .toast.success { border-left-color: #4ecca3; }
        .toast.error { border-left-color: #ff6b6b; }
        .toast.fadeout { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

        /* ---- MISC ---- */
        .truck-icon { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
        .badge { padding: 1px 5px; border-radius: 3px; font-size: 8px; font-weight: bold; }
        .badge-newbie { background: #ff6b6b; color: #fff; }
        .badge-experienced { background: #ffd700; color: #1a1a2e; }
        .badge-expert { background: #4ecca3; color: #1a1a2e; }
        .badge-express { background: #ff6b6b; color: #fff; }
        .badge-standard { background: #555; color: #aaa; }
        .section-label { font-size: 9px; color: #6d4aff; text-transform: uppercase; margin: 8px 0 4px; }
        .empty-msg { text-align: center; color: #666; font-size: 11px; padding: 16px; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
    <div class="top-stat">
        <span class="label">$</span>
        <span class="val money" id="balance">5,000</span>
    </div>
    <div class="top-stat">
        <span class="label">REV</span>
        <span class="val money" id="revenue">0</span>
    </div>
    <div class="top-stat">
        <span class="label">DAY</span>
        <span class="val day-val" id="day-num">1</span>
    </div>
    <div class="top-stat">
        <span class="label">TRKS</span>
        <span class="val" id="truck-count">1/10</span>
    </div>
    <div class="top-stat">
        <span class="label">DRV</span>
        <span class="val" id="driver-count">1</span>
    </div>
</div>

<!-- MAP -->
<div id="main-wrap">
    <canvas id="canvas"></canvas>
    <div id="toast-area"></div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
    <div id="tab-bar">
        <div class="tab active" data-tab="orders">Orders <span class="tab-badge" id="order-badge">0</span></div>
        <div class="tab" data-tab="fleet">Fleet</div>
        <div class="tab" data-tab="hire">Staff</div>
        <div class="tab" data-tab="shop">Shop</div>
        <div class="tab" data-tab="end">Day</div>
    </div>
    <div class="tab-content active" id="tab-orders">
        <div id="order-cards"></div>
    </div>
    <div class="tab-content" id="tab-fleet">
        <div id="fleet-cards"></div>
    </div>
    <div class="tab-content" id="tab-hire">
        <div id="staff-cards"></div>
    </div>
    <div class="tab-content" id="tab-shop">
        <div id="shop-cards"></div>
    </div>
    <div class="tab-content" id="tab-end">
        <div style="padding: 10px; text-align: center;">
            <div style="font-size: 11px; margin-bottom: 8px; color: #888;">
                Daily Wages: <span class="money" id="wages-preview">$0</span><br>
                Daily Maint: <span class="money" id="maint-preview">$0</span><br>
                Net/day: <span style="color:#ff6b6b;" id="net-preview">-$0</span>
            </div>
            <button class="btn btn-primary" onclick="endDay()">End Day ▶</button>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
    <div id="modal-box">
        <div id="modal-content"></div>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
// ==================== CONFIG ====================
const TRUCK_TYPES = {
    small:  { name: "Small Van",    cap: 3,  speed: 2.5, cost: 2000,  color: "#95a5a6", maint: 50  },
    medium: { name: "Box Truck",    cap: 8,  speed: 2.0, cost: 5000,  color: "#3498db", maint: 120 },
    large:  { name: "Semi",         cap: 15, speed: 1.5, cost: 12000, color: "#2ecc71", maint: 300 },
    mega:   { name: "Mega Hauler",  cap: 25, speed: 1.0, cost: 25000, color: "#9b59b6", maint: 600 }
};

const DESTS = [
    { name: "Downtown",     rx: 0.25, ry: 0.35, rate: 100, mod: 1.0 },
    { name: "Industry",     rx: 0.72, ry: 0.65, rate: 150, mod: 1.3 },
    { name: "Airport",      rx: 0.80, ry: 0.22, rate: 200, mod: 1.5 },
    { name: "Port",         rx: 0.18, ry: 0.75, rate: 220, mod: 1.6 },
    { name: "Suburb Hub",   rx: 0.50, ry: 0.50, rate: 80,  mod: 0.8 }
];

const TIERS = {
    newbie:       { mult: 1.0, wage: 300 },
    experienced:  { mult: 1.3, wage: 600 },
    expert:       { mult: 1.6, wage: 1000 }
};

const NAMES = ["Alex","Jordan","Taylor","Casey","Sam","Riley","Morgan","Quinn","Avery","Parker","Drew","Reese"];

// ==================== STATE ====================
const G = {
    canvas: null, ctx: null, W: 0, H: 0,
    balance: 5000, revenue: 0, day: 1, speed: 1.0,
    trucks: [], garage: [], employees: [], orders: [],
    selOrder: null, selTruck: null,
    truckId: 0, orderId: 0, empId: 0,
    maxTrucks: 10,
    lastOrderTime: 0, orderInterval: 8000
};

// ==================== INIT ====================
window.onload = () => {
    G.canvas = document.getElementById('canvas');
    G.ctx = G.canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);

    // Starter truck
    G.trucks.push(makeTruck('small'));
    // Starter driver
    G.employees.push(makeEmployee());

    setupTabs();
    loop();
    scheduleOrders();
    updateAll();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
};

function resize() {
    const wrap = document.getElementById('main-wrap');
    const dpr = window.devicePixelRatio || 1;
    G.W = wrap.clientWidth;
    G.H = wrap.clientHeight;
    G.canvas.width = G.W * dpr;
    G.canvas.height = G.H * dpr;
    G.canvas.style.width = G.W + 'px';
    G.canvas.style.height = G.H + 'px';
    G.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function makeTruck(type) {
    return {
        id: ++G.truckId, type,
        x: G.W * 0.5, y: G.H * 0.5,
        tx: G.W * 0.5, ty: G.H * 0.5,
        cargo: 0, state: 'idle',
        order: null, empIdx: G.trucks.length
    };
}

function makeEmployee() {
    return { id: ++G.empId, name: NAMES[Math.floor(Math.random()*NAMES.length)] + ' ' + String.fromCharCode(65+Math.floor(Math.random()*26)) + '.', tier: 'newbie', xp: 0 };
}

// ==================== TABS ====================
function setupTabs() {
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('tab-' + t.dataset.tab).classList.add('active');
        });
    });
}

// ==================== ORDERS ====================
function scheduleOrders() {
    G.lastOrderTime = Date.now();
}

function maybeGenerateOrders() {
    if (Date.now() - G.lastOrderTime < G.orderInterval) return;
    if (G.orders.filter(o => o.status === 'available').length >= 12) return;

    const n = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) {
        const pu = DESTS[Math.floor(Math.random() * DESTS.length)];
        const do_ = DESTS[Math.floor(Math.random() * DESTS.length)];
        if (pu === do_) continue;
        const order = {
            id: ++G.orderId,
            puX: pu.rx * G.W, puY: pu.ry * G.H,
            doX: do_.rx * G.W, doY: do_.ry * G.H,
            puName: pu.name, doName: do_.name,
            reward: Math.round(pu.rate * pu.mod * (0.8 + Math.random() * 0.5)),
            status: 'available',
            express: Math.random() > 0.75
        };
        if (order.express) order.reward = Math.round(order.reward * 1.5);
        G.orders.push(order);
    }
    G.lastOrderTime = Date.now();
    toast(`New orders available!`, 'info');
    updateOrders();
    updateBadges();
}

function selectOrder(id) {
    const o = G.orders.find(x => x.id === id);
    if (!o || o.status !== 'available') return;
    G.selOrder = o;
    // Find first idle truck
    const idle = G.trucks.find(t => t.state === 'idle');
    if (idle) {
        assignOrderToTruck(o, idle);
    } else {
        toast('No idle trucks! Wait for one to finish.', 'error');
        G.selOrder = null;
    }
    updateOrders();
}

function assignOrderToTruck(order, truck) {
    order.status = 'assigned';
    truck.order = order;
    truck.tx = order.puX;
    truck.ty = order.puY;
    truck.state = 'to_pickup';
    const emp = G.employees[truck.empIdx];
    toast(`${TRUCK_TYPES[truck.type].name} → ${order.puName} (Driver: ${emp ? emp.name : '?'})`, 'success');
    G.selOrder = null;
    updateAll();
}

// ==================== GAME LOOP ====================
function loop() {
    draw();
    update();
    maybeGenerateOrders();
    requestAnimationFrame(loop);
}

function update() {
    G.trucks.forEach(t => {
        if (t.state === 'idle') return;
        const tt = TRUCK_TYPES[t.type];
        const emp = G.employees[t.empIdx];
        const mult = emp ? TIERS[emp.tier].mult : 1.0;
        const spd = tt.speed * mult * 60 / 60; // base speed

        const dx = t.tx - t.x;
        const dy = t.ty - t.y;
        const d = Math.sqrt(dx*dx + dy*dy);

        if (d < 5) {
            handleArrival(t);
        } else {
            t.x += (dx / d) * spd;
            t.y += (dy / d) * spd;
        }
    });
}

function handleArrival(t) {
    const o = t.order;
    if (!o) { t.state = 'idle'; return; }

    if (t.state === 'to_pickup') {
        t.cargo = Math.min(TRUCK_TYPES[t.type].cap, t.cargo + 1);
        t.tx = o.doX;
        t.ty = o.doY;
        t.state = 'to_dropoff';
        toast(`Picked up at ${o.puName}`, 'success');
    } else if (t.state === 'to_dropoff') {
        const emp = G.employees[t.empIdx];
        const bonus = emp ? Math.round(o.reward * (TIERS[emp.tier].mult - 1)) : 0;
        const total = o.reward + bonus;
        G.balance += total;
        G.revenue += total;
        o.status = 'done';
        t.cargo = 0;
        t.order = null;
        t.state = 'idle';

        if (emp) {
            emp.xp += o.reward;
            promoteEmployee(emp);
        }
        toast(`+$${total} delivered to ${o.doName}`, 'success');
        G.orders = G.orders.filter(x => x.status !== 'done');
        updateAll();
    }
}

function promoteEmployee(emp) {
    if (emp.tier === 'newbie' && emp.xp >= 1500) {
        emp.tier = 'experienced';
        toast(`${emp.name} → Experienced!`, 'success');
    } else if (emp.tier === 'experienced' && emp.xp >= 3500) {
        emp.tier = 'expert';
        toast(`${emp.name} → Expert!`, 'success');
    }
}

// ==================== DRAWING ====================
function draw() {
    const ctx = G.ctx;
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(0, 0, G.W, G.H);

    // Grid
    ctx.strokeStyle = 'rgba(109,74,255,0.08)';
    ctx.lineWidth = 1;
    for (let x = 0; x < G.W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, G.H); ctx.stroke();
    }
    for (let y = 0; y < G.H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(G.W, y); ctx.stroke();
    }

    // Destinations
    DESTS.forEach((d, i) => {
        const x = d.rx * G.W, y = d.ry * G.H;
        const g = ctx.createRadialGradient(x, y, 0, x, y, 45);
        g.addColorStop(0, 'rgba(109,74,255,0.25)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = '#6d4aff';
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px -apple-system,monospace';
        ctx.textAlign = 'center';
        ctx.fillText(d.name, x, y - 16);
    });

    // Available orders
    G.orders.forEach(o => {
        if (o.status !== 'available') return;
        const pulse = 1 + Math.sin(Date.now() / 300) * 0.15;
        // Pickup
        ctx.fillStyle = o.express ? '#ff6b6b' : '#e74c3c';
        ctx.beginPath(); ctx.arc(o.puX, o.puY, 6 * pulse, 0, Math.PI*2); ctx.fill();
        // Dropoff
        ctx.fillStyle = '#f39c12';
        ctx.beginPath(); ctx.arc(o.doX, o.doY, 6 * pulse, 0, Math.PI*2); ctx.fill();
        // Reward
        ctx.fillStyle = '#ffd700';
        ctx.font = '8px monospace';
        ctx.fillText('$' + o.reward, o.puX, o.puY - 10);
        if (o.express) {
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 8px monospace';
            ctx.fillText('!', o.puX, o.puY + 2);
        }
    });

    // Trucks
    G.trucks.forEach(t => {
        const tt = TRUCK_TYPES[t.type];
        const sz = t.type === 'mega' ? 16 : (t.type === 'large' ? 13 : (t.type === 'medium' ? 10 : 8));

        ctx.shadowColor = tt.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = tt.color;
        ctx.fillRect(t.x - sz, t.y - sz/2, sz * 2, sz);
        ctx.shadowBlur = 0;

        // Cargo dots
        if (t.cargo > 0) {
            ctx.fillStyle = '#4ecca3';
            for (let i = 0; i < Math.min(t.cargo, 5); i++) {
                ctx.fillRect(t.x - sz + 2 + i * 4, t.y - 2, 3, 4);
            }
        }

        // Status dot
        ctx.fillStyle = t.state === 'idle' ? '#4ecca3' : '#ff6b6b';
        ctx.beginPath(); ctx.arc(t.x - sz - 3, t.y, 3, 0, Math.PI*2); ctx.fill();

        // Route line
        if (t.state !== 'idle') {
            ctx.strokeStyle = 'rgba(109,74,255,0.4)';
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.tx, t.ty); ctx.stroke();
            ctx.setLineDash([]);
        }
    });
}

// ==================== UI UPDATES ====================
function updateAll() {
    updateTopBar();
    updateOrders();
    updateFleet();
    updateStaff();
    updateShop();
    updateDayPreview();
    updateBadges();
}

function updateTopBar() {
    document.getElementById('balance').textContent = G.balance.toLocaleString();
    document.getElementById('revenue').textContent = G.revenue.toLocaleString();
    document.getElementById('day-num').textContent = G.day;
    document.getElementById('truck-count').textContent = G.trucks.length + '/' + G.maxTrucks;
    document.getElementById('driver-count').textContent = G.employees.length;
}

function updateBadges() {
    const avail = G.orders.filter(o => o.status === 'available').length;
    const badge = document.getElementById('order-badge');
    badge.textContent = avail;
    badge.style.display = avail > 0 ? 'inline' : 'none';
}

function updateOrders() {
    const c = document.getElementById('order-cards');
    const avail = G.orders.filter(o => o.status === 'available');

    if (avail.length === 0) {
        c.innerHTML = '<div class="empty-msg">Waiting for new orders…</div>';
        return;
    }

    c.innerHTML = avail.map(o => `
        <div class="card" onclick="selectOrder(${o.id})">
            <div class="card-row">
                <span class="card-title">${o.puName} → ${o.doName}</span>
                <span class="card-reward">$${o.reward}</span>
            </div>
            <div class="card-row" style="margin-top:2px;">
                <span class="badge ${o.express ? 'badge-express' : 'badge-standard'}">${o.express ? 'EXPRESS' : 'STANDARD'}</span>
                <span class="card-sub">Tap to dispatch</span>
            </div>
        </div>
    `).join('');
}

function updateFleet() {
    const c = document.getElementById('fleet-cards');
    if (G.trucks.length === 0) {
        c.innerHTML = '<div class="empty-msg">No trucks. Visit Shop to buy one.</div>';
        return;
    }

    c.innerHTML = G.trucks.map((t, i) => {
        const tt = TRUCK_TYPES[t.type];
        const emp = G.employees[t.empIdx];
        const stateLabel = t.state === 'idle' ? '🟢 IDLE'
            : t.state === 'to_pickup' ? '📍→ PICKUP'
            : t.state === 'to_dropoff' ? '📦→ DROPOFF'
            : t.state;
        return `
            <div class="card ${t.state !== 'idle' ? 'busy' : ''}">
                <div class="card-row">
                    <span class="card-title">
                        <span class="truck-icon" style="background:${tt.color}"></span>${tt.name}
                    </span>
                    <span style="font-size:10px;">${t.cargo}/${tt.cap}</span>
                </div>
                <div class="card-row" style="margin-top:2px;">
                    <span class="card-sub">${stateLabel}</span>
                    <span class="badge badge-${emp ? emp.tier : 'newbie'}">${emp ? emp.name.split(' ')[0] : '—'}</span>
                </div>
            </div>
        `;
    }).join('') + (G.garage.length > 0 ? `
        <div class="section-label">In Garage (${G.garage.length})</div>
        ${G.garage.map((g, i) => `
            <div class="card">
                <div class="card-row">
                    <span class="card-title">
                        <span class="truck-icon" style="background:${TRUCK_TYPES[g.type].color}"></span>${TRUCK_TYPES[g.type].name}
                    </span>
                    <button class="btn btn-buy" style="width:auto;padding:4px 10px;font-size:10px;" onclick="deployTruck(${i})">Deploy</button>
                </div>
            </div>
        `).join('')}
    ` : '');
}

function updateStaff() {
    const c = document.getElementById('staff-cards');
    c.innerHTML = G.employees.map(e => `
        <div class="card busy">
            <div class="card-row">
                <span class="card-title">${e.name}</span>
                <span class="badge badge-${e.tier}">${e.tier}</span>
            </div>
            <div class="card-sub">XP: ${e.xp} · Wage: $${TIERS[e.tier].wage}/day</div>
        </div>
    `).join('') + `
        <div style="margin-top:8px;">
            <button class="btn btn-buy" onclick="hireEmployee()">
                Hire Driver ($500)
            </button>
            <div class="card-sub" style="text-align:center;margin-top:4px;">
                Need ${G.employees.length >= G.trucks.length ? 'more trucks' : 'available slot'}
            </div>
        </div>
    `;
}

function updateShop() {
    const c = document.getElementById('shop-cards');
    c.innerHTML = Object.entries(TRUCK_TYPES).map(([k, t]) => `
        <div class="card">
            <div class="card-row">
                <span class="card-title">
                    <span class="truck-icon" style="background:${t.color}"></span>${t.name}
                </span>
                <span class="card-reward">$${t.cost.toLocaleString()}</span>
            </div>
            <div class="card-sub">Cap ${t.cap} · Spd ${t.speed} · Maint $${t.maint}/day</div>
            <button class="btn btn-buy" style="margin-top:6px;"
                ${(G.trucks.length + G.garage.length >= G.maxTrucks || G.balance < t.cost) ? 'disabled' : ''}
                onclick="buyTruck('${k}')">
                ${G.balance < t.cost ? 'Not enough $' : 'Buy'}
            </button>
        </div>
    `).join('');
}

function updateDayPreview() {
    const wages = G.employees.reduce((s, e) => s + TIERS[e.tier].wage, 0);
    const maint = G.trucks.reduce((s, t) => s + TRUCK_TYPES[t.type].maint, 0);
    document.getElementById('wages-preview').textContent = '$' + wages.toLocaleString();
    document.getElementById('maint-preview').textContent = '$' + maint.toLocaleString();
    document.getElementById('net-preview').textContent = '-$' + (wages + maint).toLocaleString();
}

// ==================== ACTIONS ====================
function buyTruck(type) {
    const t = TRUCK_TYPES[type];
    if (G.balance < t.cost) return;
    if (G.trucks.length + G.garage.length >= G.maxTrucks) {
        toast('Fleet at max capacity!', 'error');
        return;
    }
    G.balance -= t.cost;
    G.garage.push({ type });
    toast(`Bought ${t.name}! Deploy from Fleet tab.`, 'success');

    // Auto-deploy if spare driver exists
    if (G.employees.length > G.trucks.length) {
        deployTruck(G.garage.length - 1);
    }
    updateAll();
}

function deployTruck(garageIdx) {
    if (G.employees.length <= G.trucks.length) {
        toast('No spare drivers! Hire more staff.', 'error');
        return;
    }
    const g = G.garage.splice(garageIdx, 1)[0];
    const truck = makeTruck(g.type);
    truck.empIdx = G.trucks.length;
    G.trucks.push(truck);
    toast(`${TRUCK_TYPES[g.type].name} deployed!`, 'success');
    updateAll();
}

function hireEmployee() {
    if (G.balance < 500) { toast('Need $500 to hire!', 'error'); return; }
    if (G.employees.length >= G.maxTrucks) { toast('Max drivers reached!', 'error'); return; }
    G.balance -= 500;
    G.employees.push(makeEmployee());
    toast(`Hired ${G.employees[G.employees.length-1].name}!`, 'success');

    // Auto-deploy garage truck if possible
    if (G.garage.length > 0 && G.employees.length > G.trucks.length) {
        deployTruck(0);
    }
    updateAll();
}

function endDay() {
    const wages = G.employees.reduce((s, e) => s + TIERS[e.tier].wage, 0);
    const maint = G.trucks.reduce((s, t) => s + TRUCK_TYPES[t.type].maint, 0);
    const totalCost = wages + maint;
    G.balance -= totalCost;
    G.day++;

    if (G.balance < 0) {
        toast('⚠️ You\'re in debt!', 'error');
    }
    toast(`Day ${G.day} started. Paid $${totalCost} expenses`, 'info');
    updateAll();
}

// ==================== MODAL ====================
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

// ==================== TOAST ====================
let toastTimers = [];
function toast(msg, type) {
    const area = document.getElementById('toast-area');
    const el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    area.appendChild(el);
    setTimeout(() => {
        el.classList.add('fadeout');
        setTimeout(() => el.remove(), 300);
    }, 2500);
    // Keep max 3 toasts
    while (area.children.length > 3) area.removeChild(area.firstChild);
}
</script>
