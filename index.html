<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logistics Game - Der Planer Edition</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: -apple-system, 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            touch-action: manipulation;
        }

        /* TOP BAR */
        #top-bar {
            display: flex; align-items: center; justify-content: space-between;
            height: 44px; padding: 0 12px; background: #16213e;
            border-bottom: 1px solid #2a2a4e; flex-shrink: 0;
        }
        .top-stat { display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .top-stat .label { color: #888; font-size: 9px; }
        .top-stat .val { font-weight: bold; }
        .money { color: #4ecca3; }
        .day-val { color: #6d4aff; }

        /* MAIN WRAPPER */
        #main-wrap {
            display: flex; flex-direction: column;
            height: calc(100vh - 44px - 140px); flex: 1; position: relative;
        }
        #canvas { width: 100%; height: 100%; display: block; background: #0f3460; }

        /* BOTTOM PANEL */
        #bottom-panel {
            height: 140px; background: #16213e;
            border-top: 1px solid #2a2a4e;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        #tab-bar { display: flex; height: 36px; border-bottom: 1px solid #2a2a4e; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #888; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab.active { color: #6d4aff; border-bottom-color: #6d4aff; }
        .tab-badge { background: #ff6b6b; color: #fff; border-radius: 8px;
            padding: 1px 6px; font-size: 9px; margin-left: 4px; }
        .tab-content { flex: 1; overflow-y: auto; padding: 6px; display: none; }
        .tab-content.active { display: block; }
        .tab-content::-webkit-scrollbar { width: 4px; }
        .tab-content::-webkit-scrollbar-thumb { background: #6d4aff; border-radius: 2px; }

        /* CARDS */
        .card { background: #1a1a2e; border-radius: 6px; padding: 8px;
            margin-bottom: 6px; border: 1px solid #2a2a4e; cursor: pointer; }
        .card.unavailable { opacity: 0.5; cursor: not-allowed; }
        .card.busy { opacity: 0.7; }
        .card.selected { border-color: #4ecca3; background: #1e2e4e; }
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 12px; font-weight: bold; }
        .card-sub { font-size: 9px; color: #888; margin-top: 2px; }
        .card-reward { color: #ffd700; font-weight: bold; font-size: 13px; }
        .section-label { font-size: 9px; color: #6d4aff; text-transform: uppercase; margin: 8px 0 4px; }
        .empty-msg { text-align: center; color: #666; font-size: 11px; padding: 16px; }

        /* BADGES */
        .badge { padding: 1px 5px; border-radius: 3px; font-size: 8px; font-weight: bold; }
        .badge-newbie { background: #ff6b6b; color: #fff; }
        .badge-experienced { background: #ffd700; color: #1a1a2e; }
        .badge-expert { background: #4ecca3; color: #1a1a2e; }
        .badge-info { background: #3498db; color: #fff; }
        .badge-warning { background: #f39c12; color: #1a1a2e; }
        .badge-danger { background: #ff6b6b; color: #fff; }

        /* BUTTONS */
        .btn { padding: 8px 12px; border: none; border-radius: 6px;
            font-family: inherit; font-size: 11px; cursor: pointer; width: 100%; }
        .btn-primary { background: #6d4aff; color: #fff; }
        .btn-buy { background: #4ecca3; color: #1a1a2e; }
        .btn-danger { background: #ff6b6b; color: #fff; }
        .btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }

        /* TOAST */
        #toast-area { position: fixed; bottom: 150px; left: 8px; right: 8px;
            z-index: 60; pointer-events: none; display: flex;
            flex-direction: column; align-items: center; gap: 4px; }
        .toast { background: rgba(26,26,46,0.92); border-left: 3px solid #6d4aff;
            border-radius: 6px; padding: 6px 12px; font-size: 10px; max-width: 320px;
            animation: toastIn 0.25s ease; }
        .toast.success { border-left-color: #4ecca3; }
        .toast.error { border-left-color: #ff6b6b; }
        .toast.info { border-left-color: #3498db; }
        .toast.fadeout { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

        /* TRUCK ICON */
        .truck-icon { display: inline-block; width: 10px; height: 10px;
            border-radius: 2px; vertical-align: middle; margin-right: 4px; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
    <div class="top-stat"><span class="label">$</span><span class="val money" id="balance">5,000</span></div>
    <div class="top-stat"><span class="label">REV</span><span class="val money" id="revenue">0</span></div>
    <div class="top-stat"><span class="label">DAY</span><span class="val day-val" id="day-num">1</span></div>
    <div class="top-stat"><span class="label">TRKS</span><span class="val" id="truck-count">1/15</span></div>
    <div class="top-stat"><span class="label">DRV</span><span class="val" id="driver-count">1</span></div>
</div>

<!-- MAP -->
<div id="main-wrap">
    <canvas id="canvas"></canvas>
    <div id="toast-area"></div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
    <div id="tab-bar">
        <div class="tab active" data-tab="orders">Orders <span class="tab-badge" id="order-badge">0</span></div>
        <div class="tab" data-tab="fleet">Fleet</div>
        <div class="tab" data-tab="hire">Staff</div>
        <div class="tab" data-tab="shop">Shop</div>
    </div>
    <div class="tab-content active" id="tab-orders"><div id="order-cards"></div></div>
    <div class="tab-content" id="tab-fleet"><div id="fleet-cards"></div></div>
    <div class="tab-content" id="tab-hire"><div id="staff-cards"></div></div>
    <div class="tab-content" id="tab-shop"><div id="shop-cards"></div></div>
</div>

<script type="module">
import { initGameState, saveGame, loadGame, resetGame } from './js/state.js';
import { initUI, updateAll, showToast } from './js/ui.js';
import { generateOrders, assignTrucksToOrder, handleDeliveryCompletion, getOrderDeadlineProgress } from './js/orders.js';
import { createTruck, buyTruck, deployTruckFromGarage, getCompatibleTrucksForOrder, selectTrucksForOrder } from './js/fleet.js';
import { hireDriver, getDailyWages, getDailyMaintenance, promoteDriver, getDriverEfficiency } from './js/employees.js';
import { FREIGHT_TYPES, TRUCK_TYPES, LOCATIONS, GAME_CONFIG } from './js/config.js';

// Export to window for module access
window.initGameState = initGameState;
window.updateAll = updateAll;
window.showToast = showToast;
window.generateOrders = generateOrders;
window.assignTrucksToOrder = assignTrucksToOrder;
window.handleDeliveryCompletion = handleDeliveryCompletion;
window.getOrderDeadlineProgress = getOrderDeadlineProgress;
window.buyTruck = buyTruck;
window.deployTruckFromGarage = deployTruckFromGarage;
window.hireDriver = hireDriver;
window.selectOrderForAssignment = selectTrucksForOrder;
window.getCompatibleTrucksForOrder = getCompatibleTrucksForOrder;
window.getDriverEfficiency = getDriverEfficiency;
</script>

<script src="js/main.js"></script>
</body>
</html>
