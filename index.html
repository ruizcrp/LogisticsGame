<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Logistics Game</title>
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="top-bar">
  <div class="top-stat"><span class="label">CASH</span><span class="val money" id="balance">5,000</span></div>
  <div class="top-stat"><span class="label">REV</span><span class="val money" id="revenue">0</span></div>
  <div class="top-stat"><span class="label">DAY</span><span class="val day-val" id="day-num">1</span></div>
  <div class="top-stat"><span class="label">CTR</span><span class="val" id="contract-count">0/5</span></div>
  <div class="top-stat"><span class="label">HUB</span><span class="val" id="hub-count">1</span></div>
</div>

<div id="main-wrap">
  <canvas id="canvas"></canvas>
  <div id="toast-area"></div>
</div>

<div id="bottom-panel">
  <div id="tab-bar">
    <div class="tab active" data-tab="orders">Orders <span class="tab-badge" id="order-badge">0</span></div>
    <div class="tab" data-tab="contracts">Contracts</div>
    <div class="tab" data-tab="fleet">Fleet</div>
    <div class="tab" data-tab="drivers">Drivers</div>
    <div class="tab" data-tab="shop">Shop</div>
  </div>
  <div class="tab-content active" id="tab-orders"><div id="orders-cards"></div></div>
  <div class="tab-content" id="tab-contracts"><div id="contracts-cards"></div></div>
  <div class="tab-content" id="tab-fleet"><div id="fleet-cards"></div></div>
  <div class="tab-content" id="tab-drivers"><div id="drivers-cards"></div></div>
  <div class="tab-content" id="tab-shop"><div id="shop-cards"></div></div>
</div>

<!-- Dispatch Modal -->
<div id="dispatch-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 class="modal-title">Dispatch Truck</h3>
    <div id="dispatch-info" class="modal-info"></div>
    <div id="dispatch-list"></div>
    <button class="btn btn-secondary" onclick="closeDispatchModal()">Cancel</button>
  </div>
</div>

<!-- Driver Modal -->
<div id="driver-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 class="modal-title">Assign Driver</h3>
    <div id="driver-info" class="modal-info"></div>
    <div id="driver-list"></div>
    <button class="btn btn-secondary" onclick="closeDriverModal()">Close</button>
  </div>
</div>

<!-- Scripts in order -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/orders.js"></script>
<script src="js/fleet.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
