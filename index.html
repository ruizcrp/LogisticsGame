<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logistics Simulator Pro</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="top-bar">
  <button id="pause-btn" style="background:#4ecca3;color:#1a1a2e;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:bold;cursor:pointer;margin-right:8px;">⏸ PAUSE</button>
  <div class="stat-group">
    <div class="stat-item"><span class="stat-label">Cash</span><span class="stat-value money" id="cash">5,000</span></div>
    <div class="stat-item"><span class="stat-label">Revenue</span><span class="stat-value money" id="rev">0</span></div>
  </div>
  <div class="stat-group">
    <div class="stat-item"><span class="stat-label">Day</span><span class="stat-value day-count" id="day">1</span></div>
    <div class="stat-item"><span class="stat-label">Week</span><span class="stat-value" id="week">1</span></div>
    <div class="stat-item"><span class="stat-label">Contracts</span><span class="stat-value" id="ctr">0/5</span></div>
    <div class="stat-item"><span class="stat-label">Hubs</span><span class="stat-value" id="hub">0</span></div>
  </div>
</div>

<div id="canvas-container"><canvas id="canvas"></canvas></div>
<div id="toast-area"></div>

<div class="panel active" id="tab-map"><div id="map-list"></div></div>
<div class="panel" id="tab-orders"><div id="orders-list"></div></div>
<div class="panel" id="tab-contracts"><div id="contracts-list"></div></div>
<div class="panel" id="tab-fleet"><div id="fleet-list"></div></div>
<div class="panel" id="tab-drivers"><div id="drivers-list"></div></div>
<div class="panel" id="tab-shop"><div id="shop-list"></div></div>

<div id="nav">
  <button class="nav-btn active" data-tab="map"><span class="nav-icon">🗺️</span>Map</button>
  <button class="nav-btn" data-tab="orders"><span class="nav-icon">📋</span>Orders</button>
  <button class="nav-btn" data-tab="contracts"><span class="nav-icon">🤝</span>Contracts</button>
  <button class="nav-btn" data-tab="fleet"><span class="nav-icon">🚚</span>Fleet</button>
  <button class="nav-btn" data-tab="shop"><span class="nav-icon">🏪</span>Market</button>
</div>

<div class="modal" id="dispatch-modal">
  <div class="modal-box">
    <div class="modal-header">🚛 Dispatch Truck</div>
    <div class="modal-info" id="dispatch-info"></div>
    <div id="dispatch-items"></div>
    <button class="btn btn-secondary" onclick="closeModal('dispatch-modal')">Close</button>
  </div>
</div>

<div class="modal" id="driver-modal">
  <div class="modal-box">
    <div class="modal-header">👨‍✈️ Assign Driver</div>
    <div class="modal-info" id="driver-info"></div>
    <div id="driver-items"></div>
    <button class="btn btn-secondary" onclick="closeModal('driver-modal')">Close</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
