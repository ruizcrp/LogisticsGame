<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Logistics Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
body{font-family:sans-serif;background:#1a1a2e;color:#fff;height:100vh;overflow:hidden}
#top{display:flex;justify-content:space-around;background:#16213e;padding:10px;font-size:14px}
.money{color:#4ecca3}
#canvas{display:block;background:#0f3460}
#nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#16213e;border-top:1px solid #2a2a4e}
#nav button{flex:1;padding:10px;background:none;border:none;color:#888;font-size:12px}
#nav button.active{color:#6d4aff;border-top:2px solid #6d4aff}
.panel{position:fixed;top:54px;bottom:50px;left:0;right:0;background:#16213e;overflow-y:auto;padding:10px;display:none}
.panel.active{display:block}
.card{background:#1a1a2e;border:1px solid #2a2a4e;border-radius:6px;padding:8px;margin:6px 0}
.btn{display:block;width:100%;padding:8px;background:#4ecca3;color:#1a1a2e;border:none;border-radius:4px;margin:6px 0;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:none;justify-content:center;align-items:center}
.modal.show{display:flex}
.box{background:#1a1a2e;border:1px solid #6d4aff;border-radius:12px;padding:16px;max-width:320px;width:100%;max-height:80vh;overflow-y:auto}
.badge{padding:2px 6px;background:#6d4aff;border-radius:3px;font-size:10px}
</style>
</head>
<body>

<div id="top">
<span>CASH:<span class="money" id="cash">5000</span></span>
<span>DAY:<span id="day">1</span></span>
</div>

<canvas id="canvas"></canvas>

<div class="panel active" id="orders-panel"><div id="orders"></div></div>
<div class="panel" id="contracts-panel"><div id="contracts"></div></div>
<div class="panel" id="fleet-panel"><div id="fleet"></div></div>
<div class="panel" id="drivers-panel"><div id="drivers"></div></div>
<div class="panel" id="shop-panel"><div id="shop"></div></div>

<div id="nav">
<button data-tab="orders" class="active">Orders</button>
<button data-tab="contracts">Contracts</button>
<button data-tab="fleet">Fleet</button>
<button data-tab="drivers">Drivers</button>
<button data-tab="shop">Shop</button>
</div>

<div class="modal" id="dispatch-modal">
<div class="box">
<h3 style="color:#6d4aff">Dispatch</h3>
<div id="dispatch-list"></div>
<button onclick="closeModal('dispatch-modal')">Close</button>
</div>
</div>

<div class="modal" id="driver-modal">
<div class="box">
<h3 style="color:#6d4aff">Assign Driver</h3>
<div id="driver-list"></div>
<button onclick="closeModal('driver-modal')">Close</button>
</div>
</div>

<script>
var FT={bulk:{icon:'⛏️'},container:{icon:'📦'},cool:{icon:'❄️'},special:{icon:'⚠️'}};
var TT={t1:{name:'Basic',cost:2000,cap:4,color:'#888'},t2:{name:'Standard',cost:4000,cap:7,color:'#6d4aff'},t3:{name:'Premium',cost:8000,cap:11,color:'#3498db'},t4:{name:'Executive',cost:16000,cap:19,color:'#4ecca3'},t5:{name:'Elite',cost:32000,cap:31,color:'#ffd700'}};
var DT={d1:{name:'Novice',wage:200},d2:{name:'Qualified',wage:400},d3:{name:'Expert',wage:800},d4:{name:'Master',wage:1600},d5:{name:'Legend',wage:3200}};
var HUB={h1:{name:'Depot',cost:5000},h2:{name:'Hub',cost:10000},h3:{name:'Center',cost:20000},h4:{name:'Logistics',cost:40000},h5:{name:'Global',cost:80000}};
var COMP=[{name:'TechCorp',signFee:1000,vol:150},{name:'AutoParts',signFee:1500,vol:250},{name:'FreshFood',signFee:800,vol:100},{name:'BuildMat',signFee:2000,vol:350},{name:'Retail',signFee:1200,vol:200}];
var LOC={downtown:{x:0.25,y:0.4,ft:['container']},industrial:{x:0.75,y:0.7,ft:['bulk','special','container']},port:{x:0.15,y:0.8,ft:['bulk','container','cool']},airport:{x:0.85,y:0.25,ft:['cool','container','special']},suburb:{x:0.5,y:0.55,ft:['container','cool']}};
var NAMES=['Alex','Jordan','Taylor','Casey','Sam'];

var G={cash:5000,day:1,tick:0,fleet:[],drivers:[],hubs:[],contracts:[],orders:[],W:0,H:0,ti:0,dt:0};

window.onload=function(){
  var c=document.getElementById('canvas');
  c.width=window.innerWidth;c.height=window.innerHeight-104;
  G.W=c.width;G.H=c.height;
  
  G.fleet.push({id:1,type:'t1',x:.5,y:.5,cap:4,state:'idle',fuel:1,driverId:0,orderId:null,cargo:0});
  G.drivers.push({id:0,type:'d1',name:NAMES[0],wage:200,xp:0,truckId:0});
  G.hubs.push({id:1,name:'Home Base',x:.5,y:.5,capacity:3,maint:100});
  
  setupNav();renderAll();startGame();
};

function setupNav(){
  document.querySelectorAll('#nav button').forEach(function(b){
    b.onclick=function(){
      document.querySelectorAll('#nav button').forEach(function(x){x.classList.remove('active')});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
      this.classList.add('active');document.getElementById(this.dataset.tab+'-panel').classList.add('active');
    };
  });
}

function toast(m){var t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);padding:10px 20px;border-radius:8px;z-index:999';document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}

window.buyTruck=function(k){var cfg=TT[k];if(G.cash<cfg.cost){toast('Need $'+cfg.cost);return;}G.cash-=cfg.cost;G.fleet.push({id:G.fleet.length+1,type:k,x:G.hubs[0].x,y:G.hubs[0].y,cap:cfg.cap,state:'idle',fuel:1,driverId:null,orderId:null,cargo:0});toast('Bought '+cfg.name);renderFleet();renderShop();}

window.hireDriver=function(k){var idx=Object.keys(DT).indexOf(k),cost=300*(idx+1);if(G.cash<cost){toast('Need $'+cost);return;}G.cash-=cost;G.drivers.push({id:G.drivers.length,type:k,name:NAMES[G.drivers.length%NAMES.length],wage:DT[k].wage,xp:0,truckId:null});toast('Hired '+G.drivers[G.drivers.length-1].name);renderDrivers();renderShop();}

window.buyHub=function(k){var cfg=HUB[k];if(G.cash<cfg.cost){toast('Need $'+cfg.cost);return;}if(G.hubs.length>=5){toast('Max 5!');return;}G.cash-=cfg.cost;G.hubs.push({id:G.hubs.length+1,name:cfg.name,x:.3+Math.random()*.4,y:.3+Math.random()*.4,capacity:10,maint:100});toast('Bought '+cfg.name);renderAll();}

window.signContract=function(i){var c=COMP[i];if(G.cash<c.signFee){toast('Need $'+c.signFee);return;}if(G.contracts.some(function(x){return x.name==c.name;})){toast('Already signed!');return;}G.cash-=c.signFee;G.contracts.push({name:c.name,vol:0,goal:c.vol,active:true});toast('Signed '+c.name);renderContracts();}

window.acceptOrder=function(i){var o=G.orders.find(function(x){return x.id==i;});if(!o)return;o.status='accepted';G.orders=G.orders.filter(function(x){return x.id!=i;});G.orders.push(o);toast('Accepted!');renderOrders();}

window.openDispatch=function(tid){G.dt=tid;var t=G.fleet.find(function(x){return x.id==tid;});if(!t)return;var list=document.getElementById('dispatch-list');list.innerHTML=G.orders.filter(function(o){return o.status=='accepted';}).map(function(o){return '<div class="card" ontouchend="goPickup('+tid+','+o.id+')">'+FT[o.ft].icon+' '+o.from.name||o.from+'→'+o.to.name||o.to+'<br><span style="color:#ffd700">$'+o.reward+'</span></div>';}).join('')||'<div>No orders.</div>';document.getElementById('dispatch-modal').classList.add('show');}

window.goPickup=function(tid,oid){var t=G.fleet.find(function(x){return x.id==tid;}),o=G.orders.find(function(x){return x.id==oid;});if(!t||!o)return;t.orderId=o.id;t.state='to_pickup';t.tx=o.from.x;t.ty=o.from.y;o.status='in_transit';toast('Dispatched!');closeModal('dispatch-modal');renderFleet();renderOrders();}

window.openDriver=function(tid){G.ti=tid;var t=G.fleet.find(function(x){return x.id==tid;});if(!t)return;var drv=t.driverId!==null?G.drivers[t.driverId]:null;var list=document.getElementById('driver-list');list.innerHTML=G.drivers.map(function(d){return '<div class="card" ontouchend="assignDr('+d.id+')">'+d.name+' ('+DT[d.type].name+')<br>XP:'+d.xp+'</div>';}).join('')||'<div>No drivers.</div>';document.getElementById('driver-modal').classList.add('show');}

window.assignDr=function(did){var t=G.fleet.find(function(x){return x.id==G.ti;});if(!t)return;t.driverId=did;G.drivers[did].truckId=t.id;toast('Assigned');closeModal('driver-modal');renderFleet();renderDrivers();}

function closeModal(id){document.getElementById(id).classList.remove('show');}

function draw(){var ctx=document.getElementById('canvas').getContext('2d'),W=G.W,H=G.H;ctx.fillStyle='#0f3460';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(109,74,255,0.1)';for(var i=0;i<W;i+=50){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke()}for(var j=0;j<H;j+=50){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(W,j);ctx.stroke()}

// HUBS
G.hubs.forEach(function(h){var hx=h.x*W,hy=h.y*H;ctx.fillStyle='#4ecca3';ctx.beginPath();ctx.arc(hx,hy,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('🏠',hx,hy);})

// LOCATIONS (Cities - Blue!)
Object.entries(LOC).forEach(function(kv){var l=kv[1],lx=l.x*W,ly=l.y*H;ctx.fillStyle='rgba(109,74,255,0.2)';ctx.beginPath();ctx.arc(lx,ly,25,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6d4aff';ctx.beginPath();ctx.arc(lx,ly,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(kv[0],lx,ly-15);})

// TRUCKS
G.fleet.forEach(function(t){var sz=8,cls=TT[t.type];ctx.shadowColor=cls.color;ctx.shadowBlur=8;ctx.fillStyle=cls.color;ctx.fillRect(t.x*W-sz,t.y*H-sz/2,sz*2,sz);ctx.shadowBlur=0;ctx.fillStyle=t.fuel<0.3?'#ff6b6b':'#4ecca3';ctx.beginPath();ctx.arc(t.x*W-sz-2,t.y*H,2,0,Math.PI*2);ctx.fill();});}

function loop(){draw();G.tick++;if(G.tick%3600===0){G.day++;var wages=G.drivers.reduce(function(s,d){return s+d.wage},0);var maint=G.hubs.reduce(function(s,h){return s+h.maint},0)+G.fleet.reduce(function(s,f){return s+TT[f.type].maint||0},0);G.cash-=wages+maint;toast('Day '+G.day+' | -$'+(wages+maint));}G.uiTick++;if(G.uiTick%30===0)renderAll();requestAnimationFrame(loop);}

function startGame(){loop();setInterval(generateOrders,8000);console.log('Started');}

function generateOrders(){var acts=G.contracts.filter(function(c){return c.active;});if(acts.length===0)return;acts.forEach(function(c){if(Math.random()>.5)return;var locs=Object.values(LOC),from=locs[Math.floor(Math.random()*locs.length)],to=locs[Math.floor(Math.random()*locs.length)];while(to===from)to=locs[Math.floor(Math.random()*locs.length)];var units=5+Math.floor(Math.random()*15),reward=Math.round(units*15*Math.random()+100);var ft=['bulk','container','cool','special'][Math.floor(Math.random()*4)];G.orders.push({id:G.orders.length+1,ft:ft,units:units,from:from,to:to,reward:reward,status:'pending'});});renderOrders();}

function renderAll(){renderTop();renderOrders();renderContracts();renderFleet();renderDrivers();renderShop();}

function renderTop(){document.getElementById('cash').textContent=G.cash;document.getElementById('day').textContent=G.day;}

function renderOrders(){var c=document.getElementById('orders');c.innerHTML=(G.orders.filter(function(o){return o.status=='pending';}).length>0?'<div class="section"><strong>Pending Orders</strong></div>'+G.orders.filter(function(o){return o.status=='pending';}).map(function(o){return '<div class="card"><div>'+FT[o.ft].icon+' '+o.from.name||o.from+' → '+o.to.name||o.to+'</div><div style="color:#ffd700">$'+o.reward+'</div><button class="btn" onclick="acceptOrder('+o.id+')">Accept</button></div>';}).join(''):'<div style="color:#666;text-align:center;margin-top:20px">No orders. Sign contracts!</div>');}

function renderContracts(){var c=document.getElementById('contracts');c.innerHTML=(COMP.map(function(comp,i){var can=G.cash>=comp.signFee,signed=G.contracts.some(function(x){return x.name==comp.name;});return '<div class="card"><div>'+comp.name+'<br>$'+comp.signFee+' sign fee</div>'+(signed?'<span class="badge">✓</span>':'<button class="btn" onclick="signContract('+i+')">'+(can?'Sign':'Need $'+comp.signFee)+'</button>')+'</div>';}).join(''));}

function renderFleet(){var c=document.getElementById('fleet');c.innerHTML=(G.fleet.length>0?G.fleet.map(function(t,i){var drv=t.driverId!==null?G.drivers[t.driverId]:null;return '<div class="card"><div style="display:flex;justify-content:space-between"><span>'+TT[t.type].name+' Cap:'+t.capacity||t.cap+'</span><span class="badge">'+(t.state=='idle'?'IDLE':(t.state=='to_pickup'?'PICKUP':'BUSY'))+'</span></div><div>Fuel:'+(t.fuel*100|0)+'% Driver:'+(drv?drv.name:'NONE')+'</div><button class="btn" onclick="openDriver('+t.id+')">Driver</button><button class="btn" onclick="openDispatch('+t.id+')">Dispatch</button></div>';}).join(''):'<div style="color:#666;text-align:center;margin-top:20px">No trucks. Buy from Shop!</div>');}

function renderDrivers(){var c=document.getElementById('drivers');c.innerHTML=(G.drivers.length>0?G.drivers.map(function(d){return '<div class="card"><div>'+d.name+' ('+DT[d.type].name+')<br>Wage:$'+d.wage+'/day XP:'+d.xp+'</div><div>Truck:'+(d.truckId!==null?('ID '+d.truckId):'Unassigned')+'</div></div>';}).join(''):'<div style="color:#666;text-align:center;margin-top:20px">No drivers. Hire from Shop!</div>');}

function renderShop(){var c=document.getElementById('shop');c.innerHTML='<div style="margin-bottom:10px"><strong>Trucks</strong></div>'+Object.entries(TT).map(function(kv){var k=kv[0],cfg=kv[1],can=G.cash>=cfg.cost;return '<div class="card"><div>'+cfg.name+' Cap:'+cfg.cap+'</div><div>$'+cfg.cost+'</div><button class="btn" '+(can?'':'disabled')+' onclick="buyTruck(\''+k+'\')">'+(can?'Buy':'Need $'+cfg.cost)+'</button></div>';}).join('')+'<div style="margin:15px 0 10px"><strong>Drivers</strong></div>'+Object.entries(DT).map(function(kv,i){var k=kv[0],cfg=kv[1],cost=300*(i+1),can=G.cash>=cost;return '<div class="card"><div>'+cfg.name+'</div><div>$'+cost+'</div><button class="btn" '+(can?'':'disabled')+' onclick="hireDriver(\''+k+'\')">'+(can?'Hire':'Need $'+cost)+'</button></div>';}).join('')+'<div style="margin:15px 0 10px"><strong>Hubs</strong></div>'+Object.entries(HUB).map(function(kv){var k=kv[0],cfg=kv[1],can=G.cash>=cfg.cost;return '<div class="card"><div>'+cfg.name+'</div><div>$'+cfg.cost+'</div><button class="btn" '+(can?'':'disabled')+' onclick="buyHub(\''+k+'\')">'+(can?'Buy':'Need $'+cfg.cost)+'</button></div>';}).join('');}
</script>
</body>
</html>
